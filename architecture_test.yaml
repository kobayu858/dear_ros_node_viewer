named_paths:
- path_name: target_path
  node_chain:
  - node_name: /sensing/lidar_driver
    subscribe_topic_name: UNDEFINED
    publish_topic_name: /sensing/pointcloud_agnocast
  - node_name: /perception/detector
    subscribe_topic_name: /sensing/pointcloud_agnocast
    publish_topic_name: /perception/objects_agnocast
  - node_name: /planning/planner
    subscribe_topic_name: /perception/objects_agnocast
    publish_topic_name: /planning/trajectory

executors:
- executor_type: single_threaded_executor
  executor_name: executor_sensing
  callback_group_names:
  - /sensing/lidar_driver/callback_group_0
  - /sensing/camera_driver/callback_group_0
- executor_type: single_threaded_executor
  executor_name: executor_perception
  callback_group_names:
  - /perception/detector/callback_group_0
- executor_type: single_threaded_executor
  executor_name: executor_planning
  callback_group_names:
  - /planning/planner/callback_group_0
- executor_type: single_threaded_executor
  executor_name: executor_control
  callback_group_names:
  - /control/controller/callback_group_0
- executor_type: single_threaded_executor
  executor_name: executor_bridge
  callback_group_names:
  - /agnocast_bridge_node_12345/callback_group_0

nodes:
# ① Pure rclcpp node (no agnocast topics)
- node_name: /control/controller
  callback_groups:
  - callback_group_type: mutually_exclusive
    callback_group_name: /control/controller/callback_group_0
    callback_names:
    - /control/controller/callback_0
  callbacks:
  - callback_name: /control/controller/callback_0
    callback_type: subscription_callback
    topic_name: /planning/trajectory
    symbol: Controller::on_trajectory
  publishes: []
  subscribes:
  - topic_name: /planning/trajectory
    callback_name: /control/controller/callback_0

# ② rclcpp + Agnocast (has _agnocast topics but not agnocast::Node)
- node_name: /sensing/lidar_driver
  callback_groups:
  - callback_group_type: mutually_exclusive
    callback_group_name: /sensing/lidar_driver/callback_group_0
    callback_names:
    - /sensing/lidar_driver/callback_0
  callbacks:
  - callback_name: /sensing/lidar_driver/callback_0
    callback_type: timer_callback
    period_ns: 100000000
    symbol: LidarDriver::on_timer
  publishes:
  - topic_name: /sensing/pointcloud_agnocast
    callback_names:
    - /sensing/lidar_driver/callback_0
  subscribes: []

# ② rclcpp + Agnocast (publishes agnocast topic via bridge)
- node_name: /sensing/camera_driver
  callback_groups:
  - callback_group_type: mutually_exclusive
    callback_group_name: /sensing/camera_driver/callback_group_0
    callback_names:
    - /sensing/camera_driver/callback_0
  callbacks:
  - callback_name: /sensing/camera_driver/callback_0
    callback_type: timer_callback
    period_ns: 33000000
    symbol: CameraDriver::on_timer
  publishes:
  - topic_name: /sensing/image_agnocast
    callback_names:
    - /sensing/camera_driver/callback_0
  - topic_name: /sensing/camera_info_agnocast
    callback_names:
    - /sensing/camera_driver/callback_0
  subscribes: []

# ③ agnocast::Node (would be identified via JSON)
- node_name: /perception/detector
  callback_groups:
  - callback_group_type: mutually_exclusive
    callback_group_name: /perception/detector/callback_group_0
    callback_names:
    - /perception/detector/callback_0
    - /perception/detector/callback_1
  callbacks:
  - callback_name: /perception/detector/callback_0
    callback_type: subscription_callback
    topic_name: /sensing/pointcloud_agnocast
    symbol: Detector::on_pointcloud
  - callback_name: /perception/detector/callback_1
    callback_type: subscription_callback
    topic_name: /sensing/image_agnocast
    symbol: Detector::on_image
  publishes:
  - topic_name: /perception/objects_agnocast
    callback_names:
    - /perception/detector/callback_0
  subscribes:
  - topic_name: /sensing/pointcloud_agnocast
    callback_name: /perception/detector/callback_0
  - topic_name: /sensing/image_agnocast
    callback_name: /perception/detector/callback_1

# ① Pure rclcpp node (receives agnocast topic via bridge)
- node_name: /planning/planner
  callback_groups:
  - callback_group_type: mutually_exclusive
    callback_group_name: /planning/planner/callback_group_0
    callback_names:
    - /planning/planner/callback_0
  callbacks:
  - callback_name: /planning/planner/callback_0
    callback_type: subscription_callback
    topic_name: /perception/objects_agnocast
    symbol: Planner::on_objects
  publishes:
  - topic_name: /planning/trajectory
    callback_names:
    - /planning/planner/callback_0
  subscribes:
  - topic_name: /perception/objects_agnocast
    callback_name: /planning/planner/callback_0

# Bridge node: agnocast -> ROS 2 conversion
# camera_driver publishes camera_info_agnocast,
# bridge subscribes camera_info_agnocast and publishes camera_info (ROS 2)
- node_name: /agnocast_bridge_node_12345
  callback_groups:
  - callback_group_type: mutually_exclusive
    callback_group_name: /agnocast_bridge_node_12345/callback_group_0
    callback_names:
    - /agnocast_bridge_node_12345/callback_0
  callbacks:
  - callback_name: /agnocast_bridge_node_12345/callback_0
    callback_type: subscription_callback
    topic_name: /sensing/camera_info_agnocast
    symbol: BridgeNode::on_camera_info
  publishes:
  - topic_name: /sensing/camera_info
    callback_names:
    - /agnocast_bridge_node_12345/callback_0
  subscribes:
  - topic_name: /sensing/camera_info_agnocast
    callback_name: /agnocast_bridge_node_12345/callback_0

# ① Pure rclcpp node (receives from bridge via normal ROS 2 topic)
- node_name: /visualization/viewer
  callback_groups:
  - callback_group_type: mutually_exclusive
    callback_group_name: /visualization/viewer/callback_group_0
    callback_names:
    - /visualization/viewer/callback_0
  callbacks:
  - callback_name: /visualization/viewer/callback_0
    callback_type: subscription_callback
    topic_name: /sensing/camera_info
    symbol: Viewer::on_camera_info
  publishes: []
  subscribes:
  - topic_name: /sensing/camera_info
    callback_name: /visualization/viewer/callback_0
